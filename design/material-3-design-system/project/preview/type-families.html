<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>M3 — Font families</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); font-family: var(--md-sys-font-plain); }
  .wrap { padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
  .card { display: grid; grid-template-columns: 130px 1fr; gap: 18px; align-items: center; }
  .meta { color: var(--md-sys-color-on-surface-variant); font: 500 11px/1.3 var(--md-sys-font-plain); letter-spacing: 0.5px; text-transform: uppercase; }
  .meta small { display: block; font-weight: 400; text-transform: none; letter-spacing: 0; opacity: 0.8; margin-top: 4px; }
  .sample { font-size: 28px; line-height: 1.15; letter-spacing: -0.1px; }
  .brand   { font-family: var(--md-sys-font-brand); }
  .plain   { font-family: var(--md-sys-font-plain); }
  .code    { font-family: var(--md-sys-font-code); font-size: 22px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card"><div class="meta">Brand<small>Roboto Flex</small></div><div class="sample brand">Material 3 design — Aa Bb Cc 0123</div></div>
  <div class="card"><div class="meta">Plain<small>Roboto</small></div><div class="sample plain">Material 3 design — Aa Bb Cc 0123</div></div>
  <div class="card"><div class="meta">Code<small>Roboto Mono</small></div><div class="sample code">const tone = "P-40"; // #6750A4</div></div>
</div>
</body>
</html>
