<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>M3 — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); font-family: var(--md-sys-font-plain); }
  .wrap { padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .label { width: 90px; flex-shrink: 0; color: var(--md-sys-color-on-surface-variant); font: 500 11px/1.3 var(--md-sys-font-plain); letter-spacing: 0.5px; text-transform: uppercase; }
  .btn { height: 40px; padding: 0 24px; border-radius: var(--md-sys-shape-corner-full); border: none; cursor: pointer; font: 500 14px/1 var(--md-sys-font-plain); letter-spacing: 0.1px; display: inline-flex; align-items: center; gap: 8px; transition: box-shadow var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard); }
  .btn:hover { box-shadow: var(--md-sys-elevation-1); }
  .filled    { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
  .tonal     { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); }
  .elevated  { background: var(--md-sys-color-surface-container-low); color: var(--md-sys-color-primary); box-shadow: var(--md-sys-elevation-1); }
  .outlined  { background: transparent; color: var(--md-sys-color-primary); border: 1px solid var(--md-sys-color-outline); }
  .text      { background: transparent; color: var(--md-sys-color-primary); padding: 0 12px; }
  .ico::before { content: "favorite"; font-family: var(--md-sys-font-icon); font-size: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="label">Filled</span>   <button class="btn filled">Continue</button><button class="btn filled ico">Add to cart</button></div>
  <div class="row"><span class="label">Tonal</span>    <button class="btn tonal">Continue</button><button class="btn tonal ico">Add to cart</button></div>
  <div class="row"><span class="label">Elevated</span> <button class="btn elevated">Continue</button><button class="btn elevated ico">Add to cart</button></div>
  <div class="row"><span class="label">Outlined</span> <button class="btn outlined">Continue</button><button class="btn outlined ico">Add to cart</button></div>
  <div class="row"><span class="label">Text</span>     <button class="btn text">Continue</button><button class="btn text ico">Add to cart</button></div>
</div>
</body>
</html>
