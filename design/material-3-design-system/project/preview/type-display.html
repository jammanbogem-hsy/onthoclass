<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>M3 — Display & Headline</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); font-family: var(--md-sys-font-plain); }
  .wrap { padding: 18px 22px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--md-sys-color-outline-variant); }
  .row:last-child { border-bottom: none; }
  .meta { width: 130px; flex-shrink: 0; color: var(--md-sys-color-on-surface-variant); font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .specimen { flex: 1; min-width: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><div class="meta">Display L · 57/64</div><div class="specimen md-typescale-display-large">Headline that ships</div></div>
  <div class="row"><div class="meta">Display M · 45/52</div><div class="specimen md-typescale-display-medium">Headline that ships</div></div>
  <div class="row"><div class="meta">Display S · 36/44</div><div class="specimen md-typescale-display-small">Headline that ships</div></div>
  <div class="row"><div class="meta">Headline L · 32/40</div><div class="specimen md-typescale-headline-large">Onboarding subtitle copy</div></div>
  <div class="row"><div class="meta">Headline M · 28/36</div><div class="specimen md-typescale-headline-medium">Onboarding subtitle copy</div></div>
  <div class="row"><div class="meta">Headline S · 24/32</div><div class="specimen md-typescale-headline-small">Onboarding subtitle copy</div></div>
</div>
</body>
</html>
