<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>M3 — Spacing (4dp grid)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); font-family: var(--md-sys-font-plain); }
  .wrap { padding: 18px 22px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: grid; grid-template-columns: 60px 60px 1fr; align-items: center; gap: 14px; font: 500 11px/1.3 var(--md-sys-font-plain); color: var(--md-sys-color-on-surface-variant); letter-spacing: 0.3px; }
  .name { color: var(--md-sys-color-on-surface); font-weight: 500; }
  .bar { height: 10px; background: var(--md-sys-color-primary); border-radius: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="name">space-1</span><span>4dp</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="name">space-2</span><span>8dp</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="name">space-3</span><span>12dp</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="name">space-4</span><span>16dp</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="name">space-6</span><span>24dp</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="name">space-8</span><span>32dp</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="name">space-10</span><span>40dp</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="name">space-12</span><span>48dp</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="name">space-16</span><span>64dp</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="name">space-20</span><span>80dp</span><div class="bar" style="width:80px"></div></div>
</div>
</body>
</html>
