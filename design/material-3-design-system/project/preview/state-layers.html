<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>M3 — State layers</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); font-family: var(--md-sys-font-plain); }
  .wrap { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .demo { aspect-ratio: 1.4 / 1; background: var(--md-sys-color-primary); border-radius: 12px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--md-sys-color-on-primary); font: 500 13px/1 var(--md-sys-font-plain); letter-spacing: 0.1px; }
  .demo::after { content: ""; position: absolute; inset: 0; background: var(--md-sys-color-on-primary); opacity: 0; }
  .hover::after   { opacity: var(--md-sys-state-hover-opacity); }
  .focus::after   { opacity: var(--md-sys-state-focus-opacity); }
  .pressed::after { opacity: var(--md-sys-state-pressed-opacity); }
  .focus { outline: 3px solid var(--md-sys-color-secondary); outline-offset: 2px; }
  .meta { display: block; margin-top: 10px; color: var(--md-sys-color-on-surface-variant); font: 500 11px/1.3 var(--md-sys-font-plain); letter-spacing: 0.3px; text-align: center; }
  .col { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="col"><div class="demo">Primary</div><span class="meta">Enabled · resting</span></div>
    <div class="col"><div class="demo hover">Primary</div><span class="meta">Hover · 8%</span></div>
    <div class="col"><div class="demo focus">Primary</div><span class="meta">Focus · 12% + ring</span></div>
    <div class="col"><div class="demo pressed">Primary</div><span class="meta">Pressed · 12%</span></div>
  </div>
</div>
</body>
</html>
