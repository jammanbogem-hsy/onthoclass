<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>M3 — Material Symbols</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); font-family: var(--md-sys-font-plain); }
  .wrap { padding: 18px 22px; }
  .title { font: 500 11px/1 var(--md-sys-font-plain); letter-spacing: 0.5px; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin: 0 0 10px 2px; }
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--md-sys-color-on-surface); }
  .ico { font-family: var(--md-sys-font-icon); font-size: 28px; color: var(--md-sys-color-on-surface); }
  .nm { font: 400 9px/1.1 var(--md-sys-font-plain); color: var(--md-sys-color-on-surface-variant); text-align: center; letter-spacing: 0.2px; }
  .axes { margin-top: 18px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .axes .cell .ico { font-size: 36px; color: var(--md-sys-color-primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Material Symbols · Outlined (sampled set)</div>
  <div class="grid" id="grid"></div>
  <div class="title" style="margin-top:18px">Variable axes · FILL 0→1, wght 100→700</div>
  <div class="axes">
    <div class="cell"><span class="ico" style='font-variation-settings:"FILL" 0,"wght" 200'>favorite</span><span class="nm">wght 200, FILL 0</span></div>
    <div class="cell"><span class="ico" style='font-variation-settings:"FILL" 0,"wght" 400'>favorite</span><span class="nm">wght 400, FILL 0</span></div>
    <div class="cell"><span class="ico" style='font-variation-settings:"FILL" 0,"wght" 700'>favorite</span><span class="nm">wght 700, FILL 0</span></div>
    <div class="cell"><span class="ico" style='font-variation-settings:"FILL" 1,"wght" 200'>favorite</span><span class="nm">wght 200, FILL 1</span></div>
    <div class="cell"><span class="ico" style='font-variation-settings:"FILL" 1,"wght" 400'>favorite</span><span class="nm">wght 400, FILL 1</span></div>
    <div class="cell"><span class="ico" style='font-variation-settings:"FILL" 1,"wght" 700'>favorite</span><span class="nm">wght 700, FILL 1</span></div>
  </div>
</div>
<script>
  const names = ["home","search","favorite","settings","notifications","account_circle","mail","menu","close","check","add","edit","delete","share","star","bookmark","schedule","explore","more_vert","arrow_back","arrow_forward","chat_bubble","mic","play_arrow","pause","photo","upload","download"];
  const grid = document.getElementById('grid');
  names.forEach(n => {
    const c = document.createElement('div'); c.className = 'cell';
    c.innerHTML = `<span class="ico">${n}</span><span class="nm">${n}</span>`;
    grid.appendChild(c);
  });
</script>
</body>
</html>
