<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>M3 — Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); font-family: var(--md-sys-font-plain); }
  .wrap { padding: 26px 22px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px; }
  .card { aspect-ratio: 1.6 / 1; background: var(--md-sys-color-surface-container-lowest); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--md-sys-color-on-surface); font: 500 12px/1 var(--md-sys-font-plain); }
  .label { display: block; margin-top: 12px; color: var(--md-sys-color-on-surface-variant); text-align: center; font: 500 11px/1.3 var(--md-sys-font-plain); letter-spacing: 0.3px; }
  .col { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="col"><div class="card" style="box-shadow:var(--md-sys-elevation-0)">L0</div><div class="label">0dp</div></div>
    <div class="col"><div class="card" style="box-shadow:var(--md-sys-elevation-1)">L1</div><div class="label">1dp</div></div>
    <div class="col"><div class="card" style="box-shadow:var(--md-sys-elevation-2)">L2</div><div class="label">3dp</div></div>
    <div class="col"><div class="card" style="box-shadow:var(--md-sys-elevation-3)">L3</div><div class="label">6dp</div></div>
    <div class="col"><div class="card" style="box-shadow:var(--md-sys-elevation-4)">L4</div><div class="label">8dp</div></div>
    <div class="col"><div class="card" style="box-shadow:var(--md-sys-elevation-5)">L5</div><div class="label">12dp</div></div>
  </div>
</div>
</body>
</html>
